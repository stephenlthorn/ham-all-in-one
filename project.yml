name: HAMAllInOne
options:
  bundleIdPrefix: com.stephenthorn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: TXHUY489RV
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "HAM All-In-One needs your location to show nearby repeaters and calculate distances."
    INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "HAM All-In-One needs your location for satellite pass predictions."

targets:
  HAMAllInOne:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stephenthorn.hamallinone
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
